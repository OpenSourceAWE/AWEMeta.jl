name: Update README last run date

on:
  schedule:
    - cron: '30 7 * * *'   # Runs every day at 7:30am UTC, after overnight workflows finish
  workflow_dispatch:        # Allows manual trigger from the Actions tab

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get last completed workflow run date
        id: last_run
        run: |
          LAST_RUN=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs?per_page=1&status=completed" \
            | python3 -c "import json,sys; data=json.load(sys.stdin); runs=data.get('workflow_runs',[]); print(runs[0]['updated_at'][:10] if runs else 'unknown')")
          echo "date=$LAST_RUN" >> "$GITHUB_OUTPUT"

      - name: Update README
        run: |
          sed -i 's/\*\*Last workflow run:\*\* .*/\*\*Last workflow run:\*\* ${{ steps.last_run.outputs.date }}/' README.md

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git diff --quiet README.md || (git add README.md && git commit -m "chore: update last workflow run date to ${{ steps.last_run.outputs.date }}" && git push)
