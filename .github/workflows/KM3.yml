name: Install KiteModels#main

on:
  schedule:
    - cron: '0 5 * * *'   # Runs every day at 5am UTC
  workflow_dispatch:      # Allows manual trigger from the Actions tab

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Install matplotlib
        run: if [ "$RUNNER_OS" = "Linux" ]; then sudo apt-get update && sudo apt-get install -y python3-matplotlib; fi
        shell: bash
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install mesa
        run: sudo apt-get update && sudo apt-get install -y xorg-dev mesa-utils xvfb libgl1 freeglut3-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev
      - uses: julia-actions/install-juliaup@v2
        with:
          channel: '1'
      - name: Run script install_kitemodels_main
        run: |
          set -euxo pipefail

          # Run and capture output
          if ! xvfb-run -a -s '-screen 0 1024x768x24' ./scripts/install_kitemodels_main |& tee install_kitemodels_main.log; then
            echo "install_kitemodels_main failed; tailing log:"
            tail -n 200 install_kitemodels_main.log || true
            exit 1
          fi
      - name: Upload install_kitemodels_main log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: install_kitemodels_main-log
          path: install_kitemodels_main.log
